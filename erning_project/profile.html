<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile — ServiceHub Ahmedabad</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    
    .profile-header {
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-sm);
    }
    
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent-gradient);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
    }
    
    .profile-info h1 {
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
    }
    
    .profile-info p {
      color: var(--text-secondary);
    }
    
    .dashboard-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    
    .dashboard-card h2 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-glass);
      padding-bottom: 0.75rem;
    }
    
    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .activity-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: var(--bg-glass);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-glass);
    }
    
    .activity-info h4 {
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }
    
    .activity-info p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    
    .activity-meta {
      text-align: right;
    }
    
    .activity-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    
    .badge-call { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    .badge-whatsapp { background: rgba(16, 185, 129, 0.1); color: #10b981; }
    
    .activity-date {
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }
    
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand"><span class="icon">⚡</span> ServiceHub</a>
      <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link" id="nav-home">Home</a>
      </div>
    </div>
  </nav>

  <div class="profile-container">
    
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">U</div>
      <div class="profile-info">
        <h1 id="profileName">Loading...</h1>
        <p id="profileEmail">Loading user details...</p>
      </div>
    </div>

    <div class="dashboard-card">
      <h2>📊 Contact History</h2>
      
      <div id="activityContainer" class="activity-list">
        <!-- Activities injected here -->
        <div class="empty-state" style="display: none;" id="emptyActivity">
          <div class="empty-icon">📭</div>
          <h3>No activity yet</h3>
          <p>You haven't contacted any service providers.</p>
          <a href="index.html" class="btn-primary" style="display:inline-block; margin-top:1rem; text-decoration:none;">Find Services</a>
        </div>
      </div>
    </div>

  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
  <script src="profile.js"></script>
</body>
</html>
