<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — ServiceHub Ahmedabad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand"><span class="icon">⚡</span> ServiceHub</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Reset Password</h2>
      <p class="auth-subtitle">Enter your email and we'll generate a reset token for you.</p>
      
      <div id="resetTokenContainer" style="display: none; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--green); padding: 15px; border-radius: var(--radius-md); margin-bottom: 20px; text-align: center;">
        <p style="color: var(--green); font-weight: bold; margin-bottom: 10px;">Reset Token Generated!</p>
        <p style="font-family: monospace; font-size: 1.1rem; letter-spacing: 1px; color: var(--text-primary); user-select: all;" id="resetTokenDisplay"></p>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 10px;">(In a real app, this would be emailed to you)</p>
        <a href="reset.html" class="btn-primary" style="display: inline-block; text-align: center; margin-top: 15px; text-decoration: none;">Proceed to Reset Password</a>
      </div>

      <form id="forgotForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        
        <button type="submit" class="btn-primary">Generate Reset Token</button>
      </form>
      
      <div class="auth-footer">
        Remember your password? <a href="login.html" class="auth-link font-bold">Log In</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="script.js"></script>
</body>
</html>
