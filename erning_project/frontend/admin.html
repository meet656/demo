<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin panel for ServiceHub Ahmedabad — manage service providers.">
  <title>Admin Panel — ServiceHub Ahmedabad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand"><span class="icon">⚡</span> ServiceHub</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link" id="nav-home">Home</a>
        <a href="admin.html" class="nav-link admin-link active" id="nav-admin">⚙ Admin</a>
      </div>
    </div>
  </nav>

  <script>
    // Backend configuration
    const BASE_URL = 'https://demo-tn54.onrender.com';
    const API_BASE = `${BASE_URL}/api`;
    
    // Protect admin page immediately before rendering content
    const user = JSON.parse(localStorage.getItem('servicehub_user'));
    const token = localStorage.getItem('servicehub_token');
    
    if (!token || !user) {
      window.location.href = 'login.html';
    } else if (user.role !== 'admin') {
      window.location.href = 'index.html';
    }
  </script>

  <div class="admin-container">

    <!-- DASHBOARD -->
    <div id="dashboardSection">
      <div class="admin-header">
        <h2>📋 Service Providers</h2>
        <div style="display:flex;gap:10px;">
          <button class="btn-primary" style="width:auto;padding:8px 20px;font-size:0.9rem;" onclick="showAddForm()">+ Add Provider</button>
        </div>
      </div>

      <!-- Add/Edit Form (hidden by default) -->
      <div class="service-form" id="serviceForm" style="display:none;">
        <h3 id="formTitle">Add New Provider</h3>
        <input type="hidden" id="editId">
        <div class="form-row">
          <div class="form-group">
            <label for="svcName">Provider Name *</label>
            <input type="text" id="svcName" class="form-input" placeholder="e.g. Rajesh Electricals" required>
          </div>
          <div class="form-group">
            <label for="svcPhone">Phone Number *</label>
            <input type="tel" id="svcPhone" class="form-input" placeholder="e.g. 9876543210" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="svcLocation">Address / Location *</label>
            <input type="text" id="svcLocation" class="form-input" placeholder="e.g. Near Navrangpura Cross Roads" required>
          </div>
          <div class="form-group">
            <label for="svcArea">Area *</label>
            <select id="svcArea" class="form-input">
              <option value="Navrangpura">Navrangpura</option>
              <option value="Satellite">Satellite</option>
              <option value="Vastrapur">Vastrapur</option>
              <option value="Maninagar">Maninagar</option>
              <option value="Paldi">Paldi</option>
              <option value="Bopal">Bopal</option>
              <option value="SG Highway">SG Highway</option>
              <option value="CG Road">CG Road</option>
              <option value="Chandkheda">Chandkheda</option>
              <option value="Gota">Gota</option>
              <option value="Thaltej">Thaltej</option>
              <option value="Prahlad Nagar">Prahlad Nagar</option>
              <option value="Bodakdev">Bodakdev</option>
              <option value="Ambawadi">Ambawadi</option>
              <option value="Ellis Bridge">Ellis Bridge</option>
              <option value="Shahibaug">Shahibaug</option>
              <option value="Nikol">Nikol</option>
              <option value="Naranpura">Naranpura</option>
              <option value="Usmanpura">Usmanpura</option>
              <option value="Naroda">Naroda</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="svcCategory">Category *</label>
            <select id="svcCategory" class="form-input">
              <option value="Electrician">⚡ Electrician</option>
              <option value="Plumber">🔧 Plumber</option>
              <option value="Tutor">📚 Tutor</option>
            </select>
          </div>
          <div class="form-group">
            <div class="checkbox-group" style="margin-top:24px;">
              <input type="checkbox" id="svcPremium">
              <label for="svcPremium">⭐ Mark as Premium (show on top)</label>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-primary" style="width:auto;padding:10px 28px;" onclick="saveService()">💾 Save Provider</button>
          <button class="btn-cancel" onclick="hideForm()">Cancel</button>
        </div>
      </div>

      <!-- Services Table -->
      <div class="admin-table-wrap">
        <table class="admin-table" id="adminTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Area</th>
              <th>Category</th>
              <th>Rating</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminTableBody">
            <!-- Rows loaded dynamically -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    /**
     * Admin Panel Logic
     * ==================
     * Handles login/logout, CRUD operations for service providers.
     */

    // Note: BASE_URL and API_BASE already defined at top of file
    let adminToken = localStorage.getItem('servicehub_token') || '';

    // --- Toast ---
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      toast.innerHTML = `<span>${icons[type] || ''}</span> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // --- Load Services ---
    async function loadAdminServices() {
      try {
        const res = await fetch(`${API_BASE}/services`);
        const services = await res.json();
        renderAdminTable(services);
      } catch {
        showToast('Failed to load services', 'error');
      }
    }

    function renderAdminTable(services) {
      const tbody = document.getElementById('adminTableBody');
      if (services.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted);">No providers yet. Add one above!</td></tr>';
        return;
      }
      tbody.innerHTML = services.map(s => `
        <tr>
          <td><strong>${escapeHtml(s.name)}</strong></td>
          <td>${s.phone}</td>
          <td>${escapeHtml(s.area)}</td>
          <td>${s.category}</td>
          <td>⭐ ${s.rating} (${s.rating_count})</td>
          <td>${s.is_premium ? '<span class="badge-premium">Premium</span>' : '—'}</td>
          <td>
            <div class="table-actions">
              <button class="btn-edit" onclick="editService(${s.id})">✏️ Edit</button>
              <button class="btn-delete" onclick="deleteService(${s.id}, '${escapeHtml(s.name)}')">🗑️ Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // --- Add / Edit Form ---
    function showAddForm() {
      document.getElementById('serviceForm').style.display = 'block';
      document.getElementById('formTitle').textContent = 'Add New Provider';
      document.getElementById('editId').value = '';
      clearForm();
    }

    function hideForm() {
      document.getElementById('serviceForm').style.display = 'none';
      clearForm();
    }

    function clearForm() {
      document.getElementById('svcName').value = '';
      document.getElementById('svcPhone').value = '';
      document.getElementById('svcLocation').value = '';
      document.getElementById('svcArea').value = 'Navrangpura';
      document.getElementById('svcCategory').value = 'Electrician';
      document.getElementById('svcPremium').checked = false;
    }

    async function editService(id) {
      try {
        const res = await fetch(`${API_BASE}/services/detail/${id}`);
        const s = await res.json();
        document.getElementById('serviceForm').style.display = 'block';
        document.getElementById('formTitle').textContent = 'Edit Provider';
        document.getElementById('editId').value = id;
        document.getElementById('svcName').value = s.name;
        document.getElementById('svcPhone').value = s.phone;
        document.getElementById('svcLocation').value = s.location;
        document.getElementById('svcArea').value = s.area;
        document.getElementById('svcCategory').value = s.category;
        document.getElementById('svcPremium').checked = !!s.is_premium;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch {
        showToast('Could not load service details', 'error');
      }
    }

    async function saveService() {
      const editId = document.getElementById('editId').value;
      const payload = {
        name: document.getElementById('svcName').value.trim(),
        phone: document.getElementById('svcPhone').value.trim(),
        location: document.getElementById('svcLocation').value.trim(),
        area: document.getElementById('svcArea').value,
        category: document.getElementById('svcCategory').value,
        is_premium: document.getElementById('svcPremium').checked ? 1 : 0
      };

      if (!payload.name || !payload.phone || !payload.location) {
        showToast('Please fill all required fields', 'error');
        return;
      }

      try {
        const url = editId ? `${API_BASE}/update-service/${editId}` : `${API_BASE}/add-service`;
        const method = editId ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${adminToken}`
          },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          showToast(data.message, 'success');
          hideForm();
          loadAdminServices();
        } else {
          showToast(data.error || 'Operation failed', 'error');
        }
      } catch {
        showToast('Server error', 'error');
      }
    }

    async function deleteService(id, name) {
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      try {
        const res = await fetch(`${API_BASE}/delete-service/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const data = await res.json();
        if (res.ok) {
          showToast(data.message, 'success');
          loadAdminServices();
        } else {
          showToast(data.error || 'Delete failed', 'error');
        }
      } catch {
        showToast('Server error', 'error');
      }
    }

    // --- Init ---
    loadAdminServices();
  </script>
</body>
</html>
