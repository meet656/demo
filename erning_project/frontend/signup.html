<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — ServiceHub Ahmedabad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand"><span class="icon">⚡</span> ServiceHub</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Create an Account</h2>
      <p class="auth-subtitle">Join ServiceHub to save favorites and review providers.</p>
      
      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" minlength="6" required>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" class="form-input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-primary" style="margin-top: 10px;">Create Account</button>
      </form>
      
      <div class="auth-footer">
        Already have an account? <a href="login.html" class="auth-link font-bold">Log In</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="script.js"></script>
</body>
</html>
