<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — ServiceHub Ahmedabad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand"><span class="icon">⚡</span> ServiceHub</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Set New Password</h2>
      <p class="auth-subtitle">Enter the reset token from the previous step and your new password.</p>
      
      <form id="resetForm" class="auth-form">
        <div class="form-group">
          <label for="token">Reset Token</label>
          <input type="text" id="token" class="form-input" placeholder="Paste your token here" required>
        </div>
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" minlength="6" required>
        </div>
        
        <button type="submit" class="btn-primary" style="margin-top: 10px;">Reset Password</button>
      </form>
      
      <div class="auth-footer">
        Back to <a href="login.html" class="auth-link font-bold">Log In</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="script.js"></script>
</body>
</html>
